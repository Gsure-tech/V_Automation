<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Multi-Card Fee Calculator</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f4f7f9; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        .container { width: 100%; max-width: 900px; }
        .header-section { text-align: center; margin-bottom: 20px; width: 100%; }

        /* Layout for Cards */
        .card-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 20px; }
        @media (max-width: 600px) { .card-grid { grid-template-columns: 1fr; } }

        .card { background: white; padding: 1.5rem; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); border: 1px solid #e1e4e8; }
        .card.summary { background: #1a73e8; color: white; text-align: center; }

        h3 { margin-top: 0; font-size: 1.1rem; color: #2c3e50; border-bottom: 1px solid #eee; padding-bottom: 10px; }
        .summary h3 { color: white; border-bottom: 1px solid rgba(255,255,255,0.2); }

        label { display: block; margin-bottom: 8px; font-weight: 600; font-size: 0.85rem; color: #5f6368; }
        input { width: 100%; padding: 10px; border: 1px solid #dfe6e9; border-radius: 6px; box-sizing: border-box; font-size: 16px; margin-bottom: 15px; }

        .data-row { display: flex; justify-content: space-between; margin-bottom: 8px; font-size: 0.9rem; }
        .val { font-weight: bold; color: #2c3e50; }

        .total-display { font-size: 1.5rem; font-weight: bold; margin-top: 10px; display: block; }

        /* Toggle Styling */
        .settings-bar { background: #fff; padding: 15px; border-radius: 12px; margin-bottom: 20px; display: flex; align-items: center; justify-content: center; gap: 15px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .switch { position: relative; display: inline-block; width: 40px; height: 20px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: #ccc; transition: .4s; border-radius: 20px; }
        .slider:before { position: absolute; content: ""; height: 14px; width: 14px; left: 3px; bottom: 3px; background-color: white; transition: .4s; border-radius: 50%; }
        input:checked + .slider { background-color: #27ae60; }
        input:checked + .slider:before { transform: translateX(20px); }
    </style>
</head>
<body>

<div class="container">
    <div class="header-section">
        <h2>Registration Fee Comparison</h2>
    </div>

    <div class="settings-bar">
        <label style="margin:0">Include Fixed Charges (N 8,300)</label>
        <label class="switch">
            <input type="checkbox" id="includeFixed" checked onchange="calculate()">
            <span class="slider"></span>
        </label>
    </div>

    <div class="card-grid">
        <div class="card">
            <h3>Scenario A</h3>
            <label>Share Capital (N)</label>
            <input type="number" id="capA" placeholder="Enter amount" oninput="calculate()">
            <div class="data-row"><span>Millions:</span> <span class="val" id="unitsA">0</span></div>
            <div class="data-row"><span>Statutory:</span> <span class="val" id="statA">N 0</span></div>
            <div class="data-row"><span>Service:</span> <span class="val" id="servA">N 0</span></div>
            <hr style="border:0; border-top:1px solid #eee">
            <span class="total-display" id="totalA" style="color: #1a73e8;">N 0</span>
        </div>

        <div class="card">
            <h3>Scenario B</h3>
            <label>Share Capital (N)</label>
            <input type="number" id="capB" placeholder="Enter amount" oninput="calculate()">
            <div class="data-row"><span>Millions:</span> <span class="val" id="unitsB">0</span></div>
            <div class="data-row"><span>Statutory:</span> <span class="val" id="statB">N 0</span></div>
            <div class="data-row"><span>Service:</span> <span class="val" id="servB">N 0</span></div>
            <hr style="border:0; border-top:1px solid #eee">
            <span class="total-display" id="totalB" style="color: #1a73e8;">N 0</span>
        </div>
    </div>

    <div class="card summary">
        <h3>Comparison Summary</h3>
        <p id="diffText" style="margin: 5px 0; font-size: 0.9rem;">Difference between A and B</p>
        <span class="total-display" id="resDiff">N 0</span>
    </div>
</div>

<script>
    function getDetails(capital, includeFixed) {
        if (capital <= 0 || isNaN(capital)) return { n:0, stat:0, serv:0, total:0 };

        const n = Math.ceil(capital / 1000000);
        const nameReservation = includeFixed ? 1000 : 0;
        const fixedService = includeFixed ? 7300 : 0;

        const stat = nameReservation + (10000 * n);
        const serv = fixedService + (2500 * n);

        return { n, stat, serv, total: stat + serv };
    }

    function calculate() {
        const valA = parseFloat(document.getElementById('capA').value) || 0;
        const valB = parseFloat(document.getElementById('capB').value) || 0;
        const includeFixed = document.getElementById('includeFixed').checked;

        const dataA = getDetails(valA, includeFixed);
        const dataB = getDetails(valB, includeFixed);

        // Update UI A
        document.getElementById('unitsA').innerText = dataA.n;
        document.getElementById('statA').innerText = "N " + dataA.stat.toLocaleString();
        document.getElementById('servA').innerText = "N " + dataA.serv.toLocaleString();
        document.getElementById('totalA').innerText = "N " + dataA.total.toLocaleString();

        // Update UI B
        document.getElementById('unitsB').innerText = dataB.n;
        document.getElementById('statB').innerText = "N " + dataB.stat.toLocaleString();
        document.getElementById('servB').innerText = "N " + dataB.serv.toLocaleString();
        document.getElementById('totalB').innerText = "N " + dataB.total.toLocaleString();

        // Update Summary
        const diff = dataB.total - dataA.total;
        const diffElement = document.getElementById('resDiff');
        const diffText = document.getElementById('diffText');

        diffElement.innerText = (diff >= 0 ? "+ N " : "- N ") + Math.abs(diff).toLocaleString();
        diffText.innerText = diff >= 0 ? "Increase from A to B" : "Decrease from A to B";
    }
</script>

</body>
</html>
